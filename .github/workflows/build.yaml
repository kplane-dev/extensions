name: Build and Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  OCI_ARTIFACT: oci://ghcr.io/${{ github.repository }}-config

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Update image tag in kustomization
        run: |
          cd config/base
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}=ghcr.io/${{ env.IMAGE_NAME }}:main-${GITHUB_SHA::7}

      - name: Push config OCI artifact
        run: |
          flux push artifact ${{ env.OCI_ARTIFACT }}:main-${GITHUB_SHA::7} \
            --path=config \
            --source="${{ github.repositoryUrl }}" \
            --revision="main@sha1:${GITHUB_SHA}"
          flux tag artifact ${{ env.OCI_ARTIFACT }}:main-${GITHUB_SHA::7} \
            --tag=latest
