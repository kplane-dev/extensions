apiVersion: apps/v1
kind: Deployment
metadata:
  name: extensions
  namespace: extensions
  labels:
    app: extensions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extensions
  template:
    metadata:
      labels:
        app: extensions
    spec:
      serviceAccountName: extensions
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/kplane-dev/extensions
          args:
            - --health-probe-bind-address=:8081
            - --leader-elect
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
